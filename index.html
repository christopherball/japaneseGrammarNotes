<!doctype html>

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Japanese grammar notes organized into clean, readable reference pages."
        />
        <title>Japanese Grammar Notes</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="site-shell">
            <header class="topbar">
                <a class="brand" href="#/">
                    <span class="brand-mark">J</span>
                    <span class="brand-text">Japanese Grammar Notes</span>
